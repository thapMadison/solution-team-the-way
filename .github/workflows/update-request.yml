name: Update Request

on:
  repository_dispatch:
    types: [update-request]

jobs:
  update-request:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update request file
        run: |
          echo '${{ toJSON(github.event.client_payload) }}' > update_data.json

          REQUEST_PATH=$(node -pe "JSON.parse(fs.readFileSync('update_data.json')).path")
          STATUS=$(node -pe "JSON.parse(fs.readFileSync('update_data.json')).status")
          ASSIGNEE=$(node -pe "JSON.parse(fs.readFileSync('update_data.json')).assignee")
          REQUEST_ID=$(node -pe "JSON.parse(fs.readFileSync('update_data.json')).id")

          # Update the request file
          node -e "
          const fs = require('fs');
          const updates = JSON.parse(fs.readFileSync('update_data.json'));
          const requestFile = updates.path;

          if (fs.existsSync(requestFile)) {
            const request = JSON.parse(fs.readFileSync(requestFile));
            request.status = updates.status;
            request.assignee = updates.assignee;
            request.updatedAt = new Date().toISOString();
            fs.writeFileSync(requestFile, JSON.stringify(request, null, 2));
          }
          "

          echo "request_id=$REQUEST_ID" >> $GITHUB_OUTPUT
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "assignee=$ASSIGNEE" >> $GITHUB_OUTPUT

      - name: Update index file
        run: |
          REQUEST_ID=$(node -pe "JSON.parse(fs.readFileSync('update_data.json')).id")
          STATUS=$(node -pe "JSON.parse(fs.readFileSync('update_data.json')).status")
          ASSIGNEE=$(node -pe "JSON.parse(fs.readFileSync('update_data.json')).assignee")

          node -e "
          const fs = require('fs');
          const index = JSON.parse(fs.readFileSync('data/requests-index.json'));
          const requestId = '$REQUEST_ID';

          const requestIndex = index.requests.findIndex(r => r.id === requestId);
          if (requestIndex !== -1) {
            index.requests[requestIndex].status = '$STATUS';
            index.requests[requestIndex].assignee = '$ASSIGNEE';
          }

          index.lastUpdated = new Date().toISOString();
          fs.writeFileSync('data/requests-index.json', JSON.stringify(index, null, 2));
          "

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          git add data/
          git commit -m "Update request #$(node -pe "JSON.parse(fs.readFileSync('update_data.json')).id"): status=$(node -pe "JSON.parse(fs.readFileSync('update_data.json')).status"), assignee=$(node -pe "JSON.parse(fs.readFileSync('update_data.json')).assignee")" || echo "No changes"
          git push

      - name: Cleanup
        if: always()
        run: rm -f update_data.json
